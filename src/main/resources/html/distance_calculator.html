<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Distance Calculator - Smart PFE</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #1e1e2e; color: white; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #a12c2f; margin-bottom: 20px; }
        .address-box { background: #2a2a3e; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
        .modes { display: flex; gap: 20px; margin-bottom: 20px; }
        .modes label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .calc-btn { background: linear-gradient(135deg, #a12c2f, #FF6B6B); color: white; border: none;
            padding: 12px 32px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; }
        .calc-btn:hover { opacity: 0.9; }
        #results { margin-top: 20px; }
        .result-card { background: #2a2a3e; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
        .result-card.haversine { background: linear-gradient(135deg, #a12c2f, #FF6B6B); }
        .result-title { font-size: 13px; color: #aaa; margin-bottom: 6px; }
        .result-card.haversine .result-title { color: rgba(255,255,255,0.8); }
        .result-value { font-size: 24px; font-weight: bold; }
        .result-sub { font-size: 13px; color: #aaa; margin-top: 4px; }
        .result-card.haversine .result-sub { color: rgba(255,255,255,0.7); }
        .route-btn { background: #2980b9; color: white; border: none; padding: 10px 20px; border-radius: 6px;
            cursor: pointer; font-size: 13px; margin-top: 10px; }
        .loader { text-align: center; padding: 30px; color: #aaa; }
        .error { background: #e74c3c; border-radius: 8px; padding: 16px; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📏 Distance Calculator</h1>
        <div class="address-box">
            <strong>Meeting location:</strong> <span id="meetingAddress"></span>
        </div>
        <div class="modes">
            <label><input type="checkbox" id="modeDriving" checked> 🚗 Driving</label>
            <label><input type="checkbox" id="modeWalking" checked> 🚶 Walking</label>
        </div>
        <button class="calc-btn" onclick="calculate()">📏 Calculate Distance</button>
        <div id="results"></div>
    </div>

    <script>
        var MEETING_ADDRESS = new URLSearchParams(window.location.search).get('address') || 'Unknown';
        document.getElementById('meetingAddress').textContent = MEETING_ADDRESS;
        var userLat, userLng, destLat, destLng;

        function calculate() {
            var container = document.getElementById('results');
            container.innerHTML = '<div class="loader">⏳ Getting your location...</div>';
            getUserLocation()
                .then(function(pos) {
                    userLat = pos.lat; userLng = pos.lng;
                    container.innerHTML = '<div class="loader">🔍 Geocoding address...</div>';
                    return geocodeAddress(MEETING_ADDRESS);
                })
                .then(function(dest) {
                    destLat = dest.lat; destLng = dest.lng;
                    var haversine = calculateHaversineDistance({lat:userLat,lng:userLng},{lat:destLat,lng:destLng});
                    var modes = [];
                    if (document.getElementById('modeDriving').checked) modes.push('driving');
                    if (document.getElementById('modeWalking').checked) modes.push('walking');
                    container.innerHTML = buildHaversineCard(haversine);
                    var promises = modes.map(function(mode) {
                        return calculateDistanceMatrix({lat:userLat,lng:userLng},{lat:destLat,lng:destLng},mode)
                            .then(function(r) { container.innerHTML += buildRouteCard(r, mode); })
                            .catch(function() { container.innerHTML += buildErrorCard(mode); });
                    });
                    return Promise.all(promises);
                })
                .catch(function(err) {
                    container.innerHTML = '<div class="error">❌ ' + err + '</div>';
                });
        }

        function getUserLocation() {
            return new Promise(function(resolve, reject) {
                if (!navigator.geolocation) { reject('Geolocation not supported'); return; }
                navigator.geolocation.getCurrentPosition(
                    function(pos) { resolve({lat:pos.coords.latitude, lng:pos.coords.longitude}); },
                    function(err) { reject('Location error: ' + err.message); },
                    {enableHighAccuracy:true, timeout:10000}
                );
            });
        }

        function geocodeAddress(address) {
            var url = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(address) + '&limit=1';
            return fetch(url, {headers:{'User-Agent':'Smart-PFE-Distance-Calculator'}})
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (!data || data.length === 0) throw 'Address not found: ' + address;
                    return {lat:parseFloat(data[0].lat), lng:parseFloat(data[0].lon)};
                });
        }

        function calculateHaversineDistance(p1, p2) {
            var R = 6371;
            var dLat = (p2.lat - p1.lat) * Math.PI / 180;
            var dLng = (p2.lng - p1.lng) * Math.PI / 180;
            var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
                    Math.cos(p1.lat*Math.PI/180)*Math.cos(p2.lat*Math.PI/180)*
                    Math.sin(dLng/2)*Math.sin(dLng/2);
            var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function calculateDistanceMatrix(origin, dest, mode) {
            var osrmMode = (mode === 'walking') ? 'foot' : 'driving';
            var url = 'https://router.project-osrm.org/route/v1/' + osrmMode + '/'
                + origin.lng + ',' + origin.lat + ';' + dest.lng + ',' + dest.lat + '?overview=false';
            return fetch(url)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (!data.routes || data.routes.length === 0) throw 'No route found';
                    var route = data.routes[0];
                    var distKm = (route.distance / 1000).toFixed(1);
                    var durMin = Math.round(route.duration / 60);
                    return {distance:distKm + ' km', duration:durMin + ' min'};
                });
        }

        function buildHaversineCard(km) {
            return '<div class="result-card haversine">'
                + '<div class="result-title">📏 As the crow flies</div>'
                + '<div class="result-value">' + km.toFixed(1) + ' km</div>'
                + '<div class="result-sub">Straight-line distance</div>'
                + '</div>';
        }

        function buildRouteCard(r, mode) {
            var icon = mode === 'driving' ? '🚗' : '🚶';
            var label = mode === 'driving' ? 'By Car' : 'On Foot';
            var osmEngine = mode === 'driving' ? 'fossgis_osrm_car' : 'fossgis_osrm_foot';
            var osmUrl = 'https://www.openstreetmap.org/directions?from=' + userLat + ',' + userLng
                + '&to=' + destLat + ',' + destLng + '&engine=' + osmEngine;
            return '<div class="result-card">'
                + '<div class="result-title">' + icon + ' ' + label + '</div>'
                + '<div class="result-value">' + r.distance + '</div>'
                + '<div class="result-sub">⏱️ ' + r.duration + '</div>'
                + '<button class="route-btn" onclick="window.open(\'' + osmUrl + '\',\'_blank\')">🗺️ Open Route</button>'
                + '</div>';
        }

        function buildErrorCard(mode) {
            return '<div class="result-card"><div class="result-title">⚠️ ' + mode + '</div><div class="result-sub">Route unavailable</div></div>';
        }
    </script>
</body>
</html>
